<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💑 Finanças da Família</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
:root{
  --cg:'Century Gothic','Nunito','Trebuchet MS',Arial,sans-serif;
  --green:#1D9E75;--green-l:#E1F5EE;--green-d:#085041;
  --red:#D85A30;--red-l:#FAECE7;--red-d:#4A1B0C;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-d:#412402;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#26215C;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-d:#042C53;
  --pink:#D4537E;--pink-l:#FBEAF0;--pink-d:#4B1528;
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeece8;
  --border:rgba(0,0,0,0.10);
  --text:#1a1a1a;--muted:#6b6b68;--hint:#aaaaaa;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,0.07);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --border:rgba(255,255,255,0.10);
    --text:#f0f0f0;--muted:#a0a09d;--hint:#666;
    --green-l:#0d3326;--green-d:#9FE1CB;
    --red-l:#3d1a0d;--red-d:#F0997B;
    --amber-l:#3d2a05;--amber-d:#FAC775;
    --purple-l:#1e1a4a;--purple-d:#AFA9EC;
    --blue-l:#0a1f3d;--blue-d:#85B7EB;
    --pink-l:#2d0e1c;--pink-d:#ED93B1;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--cg);background:var(--bg3);overflow-x:hidden;}
.app-shell{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);color:var(--text);}

/* VIEWS */
.view{display:none;flex-direction:column;min-height:100vh;background:var(--bg);}
.view.active{display:flex;}

/* ONBOARDING */
.ob-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem;gap:1rem;overflow-y:auto;padding-bottom:2rem;}
.ob-top{display:flex;align-items:center;gap:8px;width:100%;}
.ob-back{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:6px 8px;border-radius:8px;}
.ob-back:hover{background:var(--bg2);}
.ob-title-wrap{flex:1;}
.ob-title{font-family:var(--cg);font-size:16px;font-weight:800;color:var(--text);}
.ob-sub{font-family:var(--cg);font-size:11px;color:var(--muted);}
.ob-steps{display:flex;gap:5px;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--bg2);}
.sdot.active{background:var(--purple);}
.sdot.done{background:var(--green);}
.ob-card{background:var(--bg);border:.5px solid var(--border);border-radius:16px;padding:1.25rem;width:100%;max-width:380px;}
.ob-card-title{font-family:var(--cg);font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.av-preview{width:60px;height:60px;border-radius:50%;border:3px solid var(--purple);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px;transition:border-color .2s;}
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px;}
.av-opt{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .15s;}
.av-opt:hover{border-color:var(--purple);transform:scale(1.08);}
.av-opt.sel{border-color:var(--purple);border-width:2.5px;background:var(--purple-l);}
.col-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.col-opt{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .15s;}
.col-opt:hover{transform:scale(1.15);}
.col-opt.sel{outline:2.5px solid var(--text);outline-offset:2px;}

/* PIN */
.pin-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:2rem 1rem;}
.pin-av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;}
.pin-dots{display:flex;gap:12px;}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .2s;}
.pdot.filled{background:var(--purple);border-color:var(--purple);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:220px;}
.pbtn{font-family:var(--cg);font-size:18px;font-weight:800;padding:14px;border:none;border-radius:12px;background:var(--bg2);color:var(--text);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.pbtn:active{background:var(--purple-l);color:var(--purple);}
.pbtn.del{color:var(--red);}
.pin-err{font-family:var(--cg);font-size:11px;color:var(--red);min-height:16px;text-align:center;}
.pin-cancel{font-family:var(--cg);font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 12px;margin-top:.25rem;}

/* HOME GERAL */
.home-wrap{flex:1;padding:1rem;overflow-y:auto;padding-bottom:2rem;}
.home-greeting{font-family:var(--cg);font-size:20px;font-weight:800;color:var(--text);margin-bottom:2px;}
.home-date{font-family:var(--cg);font-size:11px;color:var(--muted);margin-bottom:1.25rem;}
.home-summary{background:var(--bg);border:.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:1.25rem;box-shadow:var(--shadow);}
.hs-title{font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text);margin-bottom:10px;}
.hs-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.hs-kpi{border-radius:9px;padding:9px 10px;text-align:center;}
.hs-lbl{font-family:var(--cg);font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;opacity:.75;margin-bottom:2px;}
.hs-val{font-family:var(--cg);font-size:13px;font-weight:800;}

/* GRADE IPHONE */
.section-title{font-family:var(--cg);font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem;}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.app-icon-box{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:27px;transition:transform .12s;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.app-icon:active .app-icon-box{transform:scale(.88);}
.app-icon-label{font-family:var(--cg);font-size:9px;font-weight:700;color:var(--text);text-align:center;max-width:62px;line-height:1.2;}

/* PERFIS */
.profiles-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:1.25rem;-webkit-overflow-scrolling:touch;}
.profiles-row::-webkit-scrollbar{display:none;}
.profile-pill{display:flex;align-items:center;gap:7px;padding:8px 13px;background:var(--bg);border:.5px solid var(--border);border-radius:99px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;box-shadow:var(--shadow);-webkit-tap-highlight-color:transparent;}
.profile-pill:active{transform:scale(.96);}
.ppav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid transparent;}
.ppname{font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text);}
.pptag{font-family:var(--cg);font-size:9px;color:var(--muted);}
.add-pill{display:flex;align-items:center;gap:5px;padding:8px 13px;background:var(--bg2);border:.5px dashed var(--border);border-radius:99px;cursor:pointer;white-space:nowrap;font-family:var(--cg);font-size:11px;color:var(--muted);flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.add-pill:active{background:var(--purple-l);color:var(--purple);}

/* HOME INDIVIDUAL */
.ind-home{flex:1;padding:1rem;overflow-y:auto;padding-bottom:2rem;}
.ind-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.ind-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:3px solid transparent;flex-shrink:0;}
.ind-name{font-family:var(--cg);font-size:16px;font-weight:800;color:var(--text);}
.ind-sub{font-family:var(--cg);font-size:10px;color:var(--muted);}
.ind-back{margin-left:auto;background:none;border:.5px solid var(--border);cursor:pointer;color:var(--muted);font-size:11px;font-family:var(--cg);font-weight:700;padding:6px 11px;border-radius:8px;-webkit-tap-highlight-color:transparent;}
.ind-kpis{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1rem;}
.ikpi{border-radius:10px;padding:12px 13px;}
.ikpi-lbl{font-family:var(--cg);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.8;margin-bottom:3px;}
.ikpi-val{font-family:var(--cg);font-size:18px;font-weight:800;}
.ikpi-sub{font-family:var(--cg);font-size:9px;opacity:.7;margin-top:1px;}
.ind-app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1rem;}

/* PANEL */
.panel-header{background:var(--bg);border-bottom:.5px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:9px;position:sticky;top:0;z-index:10;}
.ph-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid transparent;flex-shrink:0;}
.ph-name{font-family:var(--cg);font-size:13px;font-weight:800;color:var(--text);flex:1;}
.ph-back{font-family:var(--cg);font-size:10px;font-weight:700;padding:5px 11px;border:.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.panel-content{flex:1;overflow-y:auto;padding:12px 12px 80px;}

/* CARDS */
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);}
.card-title{font-family:var(--cg);font-size:12px;font-weight:800;color:var(--text);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.stitle{font-family:var(--cg);font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:11px 0 6px;}
.pbar-bg{background:var(--bg2);border-radius:99px;height:6px;overflow:hidden;}
.pbar-fill{height:6px;border-radius:99px;transition:width .4s;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fgf{grid-column:1/-1;}
.flabel{font-family:var(--cg);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.finput{font-family:var(--cg);font-size:13px;padding:9px 10px;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;width:100%;}
.finput:focus{border-color:var(--purple);}
.fsel{font-family:var(--cg);font-size:13px;padding:9px 10px;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;width:100%;}
.btn{font-family:var(--cg);font-size:12px;font-weight:800;padding:10px 16px;border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:5px;color:#fff;transition:opacity .15s;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:.8;}
.btn-ghost{font-family:var(--cg);font-size:12px;font-weight:700;padding:10px 16px;border:.5px solid var(--border);border-radius:var(--radius);background:none;color:var(--muted);cursor:pointer;}
.btn-row{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}

/* TX */
.tx-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);margin-bottom:5px;box-shadow:var(--shadow);}

/* META */
.meta-item{background:var(--bg2);border-radius:9px;padding:11px 13px;margin-bottom:7px;}
.meta-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.meta-name{font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text);}
.meta-pct{font-family:var(--cg);font-size:11px;font-weight:800;}
.meta-vals{display:flex;justify-content:space-between;font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:3px;}
.meta-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px;}
.meta-del:hover{color:var(--red);}

/* MODAL */
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:var(--bg);border-radius:16px;padding:18px;width:100%;max-width:360px;border:.5px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-title{font-family:var(--cg);font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;}
.modal-btns{display:flex;gap:7px;margin-top:12px;justify-content:flex-end;flex-wrap:wrap;}

.empty{text-align:center;padding:2rem 0;color:var(--hint);font-size:12px;font-family:var(--cg);}
</style>
</head>
<body>
<div class="app-shell" id="app">

<!-- VIEW HOME GERAL -->
<div id="view-home-geral" class="view active"></div>

<!-- VIEW ONBOARDING -->
<div id="view-onboarding" class="view"></div>

<!-- VIEW PIN -->
<div id="view-pin" class="view"></div>

<!-- VIEW HOME INDIVIDUAL -->
<div id="view-home-ind" class="view"></div>

<!-- VIEW PAINEL -->
<div id="view-panel" class="view"></div>

<!-- MODAL META -->
<div class="modal-ov" id="modal-fmeta" style="display:none">
  <div class="modal">
    <div class="modal-title">🎯 Nova meta de poupança</div>
    <div class="form-grid">
      <div class="fg fgf"><label class="flabel">Descrição</label><input class="finput" id="fmeta-nome" placeholder="Ex: Bicicleta, Viagem, Faculdade…" type="text"></div>
      <div class="fg"><label class="flabel">Valor alvo (R$)</label><input class="finput" id="fmeta-alvo" placeholder="0,00" type="number" min="0" inputmode="decimal"></div>
      <div class="fg"><label class="flabel">Já guardado (R$)</label><input class="finput" id="fmeta-atual" placeholder="0,00" type="number" min="0" inputmode="decimal"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="fecharMMeta()">Cancelar</button>
      <button class="btn" style="background:var(--green)" onclick="salvarFMeta()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL LANÇAR -->
<div class="modal-ov" id="modal-lancar" style="display:none">
  <div class="modal">
    <div class="modal-title" id="lc-title">💸 Novo lançamento</div>
    <div class="form-grid">
      <div class="fg fgf"><label class="flabel">Descrição</label><input class="finput" id="lc-desc" placeholder="Ex: Mesada, Lanche, Salário…" type="text"></div>
      <div class="fg"><label class="flabel">Valor (R$)</label><input class="finput" id="lc-valor" placeholder="0,00" type="number" min="0" step="0.01" inputmode="decimal"></div>
      <div class="fg"><label class="flabel">Data</label><input class="finput" id="lc-data" type="date"></div>
      <div class="fg"><label class="flabel">Tipo</label><select class="fsel" id="lc-tipo" onchange="atualizaCatModal()"><option value="receita">Recebimento</option><option value="despesa">Gasto / Despesa</option></select></div>
      <div class="fg fgf"><label class="flabel">Categoria</label><select class="fsel" id="lc-cat"></select></div>
      <div class="fg fgf"><label class="flabel">Observação</label><input class="finput" id="lc-obs" placeholder="Opcional…" type="text"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="fecharMLancar()">Cancelar</button>
      <button class="btn" style="background:var(--green)" onclick="addTxModal('receita')"><i class="ti ti-arrow-up"></i> <span id="lc-lbl-rec">Receita</span></button>
      <button class="btn" style="background:var(--red)" onclick="addTxModal('despesa')"><i class="ti ti-arrow-down"></i> <span id="lc-lbl-desp">Despesa</span></button>
    </div>
  </div>
</div>

</div><!-- /app-shell -->

<script>
const LS=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||'null')||d;}catch(e){return d;}};
const SS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const NOW=new Date();
const MESES_FULL=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

const AVAT_AD=['👨','👩','🧔','👱','🧑','👨‍💼','👩‍💼','👨‍🦱','👩‍🦱','👨‍🦰','👩‍🦰','🧑‍💻'];
const AVAT_KID=['👦','👧','🧒','👶','🌟','🦁','🐯','🐼','🎮','⚽','🎨','🎸','🦊','🐧','🚀','🎯'];
const CORES=['#534AB7','#1D9E75','#D85A30','#BA7517','#378ADD','#D4537E','#8B5CF6','#0EA5E9','#10B981','#F59E0B','#EF4444','#E879F9'];
const CAT_AD=[
  {id:'sal',nome:'Salário',tipo:'receita',cor:'#1D9E75'},{id:'fre',nome:'Freelance',tipo:'receita',cor:'#534AB7'},
  {id:'inv',nome:'Investimentos',tipo:'receita',cor:'#BA7517'},{id:'rec',nome:'Outros Recebimentos',tipo:'receita',cor:'#5F5E5A'},
  {id:'mor',nome:'Moradia',tipo:'despesa',cor:'#534AB7'},{id:'ali',nome:'Alimentação',tipo:'despesa',cor:'#1D9E75'},
  {id:'tra',nome:'Transporte',tipo:'despesa',cor:'#BA7517'},{id:'sau',nome:'Saúde',tipo:'despesa',cor:'#D85A30'},
  {id:'edu',nome:'Educação',tipo:'despesa',cor:'#378ADD'},{id:'laz',nome:'Lazer',tipo:'despesa',cor:'#D4537E'},
  {id:'out',nome:'Outros',tipo:'ambos',cor:'#5F5E5A'}
];
const CAT_KID=[
  {id:'mes',nome:'Mesada',tipo:'receita',cor:'#1D9E75'},{id:'pre',nome:'Presente',tipo:'receita',cor:'#8B5CF6'},
  {id:'rec2',nome:'Outros Recebimentos',tipo:'receita',cor:'#5F5E5A'},
  {id:'lan',nome:'Lanche',tipo:'despesa',cor:'#F59E0B'},{id:'bri',nome:'Brinquedo',tipo:'despesa',cor:'#0EA5E9'},
  {id:'jog',nome:'Jogo/App',tipo:'despesa',cor:'#D4537E'},{id:'mat',nome:'Material',tipo:'despesa',cor:'#534AB7'},
  {id:'eco',nome:'Poupança',tipo:'despesa',cor:'#10B981'},{id:'out2',nome:'Outros',tipo:'ambos',cor:'#5F5E5A'}
];

let usuarios=LS('fam1_users',[]);
let currentUser=null;
let currentPanel='painel';
let ob={step:0,avatar:'👨',cor:CORES[0],tipo:'adulto',subtipo:'m',nome:'',idade:'',pinPhase:1,pinVal:'',pinConf:''};
let pinCtx={uid:null,val:''};
let fmetaUid=null;

function saveUsers(){SS('fam1_users',usuarios);}
function getTxs(uid){return LS('fam1_txs_'+uid,[]);}
function saveTxs(uid,v){SS('fam1_txs_'+uid,v);}
function getMetas(uid){return LS('fam1_metas_'+uid,[]);}
function saveMetas(uid,v){SS('fam1_metas_'+uid,v);}
function getMetaMens(uid){return LS('fam1_mm_'+uid,0);}
function getCats(uid){const u=usuarios.find(u=>u.id===uid);return LS('fam1_cats_'+uid,JSON.parse(JSON.stringify(u?.tipo==='filho'?CAT_KID:CAT_AD)));}
function fmt(v){return 'R$\u00A0'+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(v){return 'R$\u00A0'+Math.round(Number(v)).toLocaleString('pt-BR');}
function catCor(uid,nome){const c=getCats(uid).find(c=>c.nome===nome);return c?c.cor:'#888';}

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');}

function getMesData(txs,mes,ano){
  const fil=txs.filter(t=>{const d=new Date(t.data+'T12:00:00');return d.getMonth()===mes&&d.getFullYear()===ano;});
  const rec=fil.filter(t=>t.tipo==='receita').reduce((a,t)=>a+Number(t.valor),0);
  const desp=fil.filter(t=>t.tipo==='despesa').reduce((a,t)=>a+Number(t.valor),0);
  return{rec,desp,saldo:rec-desp,fil};
}

/* ===== HOME GERAL ===== */

function setObTipo(t){ob.tipo=t;ob.avatar=t==='filho'?'👦':'👨';renderOB();}

function renderAvGrid(){
  const g=document.getElementById('ob-av-grid');if(!g)return;
  const avs=ob.tipo==='filho'?AVAT_KID:AVAT_AD;
  g.innerHTML=avs.map(a=>`<div class="av-opt${ob.avatar===a?' sel':''}" onclick="selAv('${a}')">${a}</div>`).join('');
}
function selAv(a){ob.avatar=a;const p=document.getElementById('ob-prev');if(p)p.textContent=a;document.querySelectorAll('.av-opt').forEach(el=>el.classList.toggle('sel',el.textContent===a));}

function renderColGrid(){
  const g=document.getElementById('ob-col-grid');if(!g)return;
  g.innerHTML=CORES.map(c=>`<div class="col-opt${ob.cor===c?' sel':''}" style="background:${c}" onclick="selCor('${c}')"></div>`).join('');
}
function selCor(c){ob.cor=c;const p=document.getElementById('ob-prev');if(p)p.style.borderColor=c;document.querySelectorAll('.col-opt').forEach(el=>el.classList.toggle('sel',el.style.background===c||el.style.backgroundColor===c));}

function obNext(){
  const nome=(document.getElementById('ob-nome')||{}).value?.trim();
  if(!nome){alert('Digite o nome!');return;}
  ob.nome=nome;
  const sub=document.getElementById('ob-sub');if(sub)ob.subtipo=sub.value;
  const idade=document.getElementById('ob-idade');if(idade)ob.idade=idade.value;
  ob.step=1;ob.pinPhase=1;ob.pinVal='';ob.pinConf='';renderOB();
}

function obUpdDots(){
  const dots=document.querySelectorAll('#ob-dots .pdot');
  const val=ob.pinPhase===1?ob.pinVal:ob.pinConf;
  dots.forEach((d,i)=>d.classList.toggle('filled',i<val.length));
}
function obPin(d){
  if(ob.pinPhase===1)ob.pinVal+=d;else ob.pinConf+=d;
  obUpdDots();
  const cur=ob.pinPhase===1?ob.pinVal:ob.pinConf;
  if(cur.length===4){
    if(ob.pinPhase===1){ob.pinPhase=2;ob.pinConf='';setTimeout(()=>renderOB(),300);}
    else{
      if(ob.pinVal===ob.pinConf){finishOB();}
      else{const e=document.getElementById('ob-err');if(e)e.textContent='PINs diferentes. Tente novamente.';ob.pinConf='';ob.pinVal='';ob.pinPhase=1;setTimeout(()=>renderOB(),700);}
    }
  }
}
function obPinDel(){if(ob.pinPhase===1)ob.pinVal=ob.pinVal.slice(0,-1);else ob.pinConf=ob.pinConf.slice(0,-1);obUpdDots();}

function finishOB(){
  const u={id:Date.now()+'',nome:ob.nome,avatar:ob.avatar,cor:ob.cor,tipo:ob.tipo,subtipo:ob.subtipo,idade:ob.idade,pin:ob.pinVal};
  usuarios.push(u);saveUsers();renderHomeGeral();
}

function solicitarPin(uid){

  showView('pin');

        <button class="pbtn del" onclick="pinDel()">⌫</button>
      </div>
      <div class="pin-err" id="pin-err"></div>
    </div>`;
}

function pinUpdDots(){const dots=document.querySelectorAll('#pin-dots .pdot');dots.forEach((d,i)=>d.classList.toggle('filled',i<pinCtx.val.length));}
function pinIn(d){
  pinCtx.val+=d;pinUpdDots();
  if(pinCtx.val.length===4){
    const u=usuarios.find(u=>u.id===pinCtx.uid);
    if(pinCtx.val===u.pin){currentUser=u;renderHomeInd();}
    else{const e=document.getElementById('pin-err');if(e)e.textContent='PIN incorreto. Tente novamente.';pinCtx.val='';setTimeout(()=>pinUpdDots(),100);}
  }
}
function pinDel(){pinCtx.val=pinCtx.val.slice(0,-1);pinUpdDots();}

function renderPC(sec){
  const pc=document.getElementById('pc');if(!pc)return;
  const u=currentUser;
  const mes=NOW.getMonth(),ano=NOW.getFullYear();
  const d=getMesData(getTxs(u.id),mes,ano);
  const isFil=u.tipo==='filho';

  if(sec==='painel'){
    const metas=getMetas(u.id);const mm=getMetaMens(u.id);
    const cats={};d.fil.filter(t=>t.tipo==='despesa').forEach(t=>{cats[t.categoria]=(cats[t.categoria]||0)+Number(t.valor);});
    const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);const tot=sorted.reduce((a,c)=>a+c[1],0);
    const econ=d.rec>0?Math.max(0,(d.saldo/d.rec)*100):0;
    let pm=mes-1,pa=ano;if(pm<0){pm=11;pa=ano-1;}
    const prev=getMesData(getTxs(u.id),pm,pa);

    pc.innerHTML=`
      <div style="font-family:var(--cg);font-size:14px;font-weight:800;color:var(--text);margin-bottom:9px">${MESES_FULL[mes]} ${ano}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;">
        <div class="ikpi" style="background:${u.cor}15"><div class="ikpi-lbl" style="color:${u.cor}">${isFil?'Recebimentos':'Receitas'}</div><div class="ikpi-val" style="color:${u.cor}">${fmt(d.rec)}</div></div>
        <div class="ikpi" style="background:var(--red-l)"><div class="ikpi-lbl" style="color:var(--red-d)">${isFil?'Gastos':'Despesas'}</div><div class="ikpi-val" style="color:var(--red-d)">${fmt(d.desp)}</div></div>
        <div class="ikpi" style="background:${d.saldo>=0?'var(--green-l)':'var(--red-l)'}"><div class="ikpi-lbl" style="color:${d.saldo>=0?'var(--green-d)':'var(--red-d)'}">Saldo</div><div class="ikpi-val" style="color:${d.saldo>=0?'var(--green-d)':'var(--red-d)'}">${fmt(d.saldo)}</div></div>
        <div class="ikpi" style="background:var(--amber-l)"><div class="ikpi-lbl" style="color:var(--amber-d)">Poupança</div><div class="ikpi-val" style="color:var(--amber-d)">${econ.toFixed(1)}%</div></div>
      </div>
      ${mm>0?`<div class="card" style="padding:10px 13px;"><div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-family:var(--cg);font-size:11px;font-weight:800">Meta mensal de economia</span><span style="font-family:var(--cg);font-size:11px;font-weight:800;color:${d.saldo>=mm?'var(--green-d)':'var(--amber-d)'}">${mm>0?Math.min(100,Math.max(0,(d.saldo/mm)*100)).toFixed(0):0}%</span></div><div class="pbar-bg"><div class="pbar-fill" style="width:${Math.min(100,Math.max(0,(d.saldo/mm)*100))}%;background:${d.saldo>=mm?'#1D9E75':'#BA7517'}"></div></div><div style="display:flex;justify-content:space-between;font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:2px"><span>${fmt(Math.max(0,d.saldo))}</span><span>${fmt(mm)}</span></div></div>`:''}
      ${prev.rec>0||prev.desp>0?`
      <div class="stitle">vs. mês anterior (${MESES[pm]}/${pa})</div>
      <div class="card" style="padding:10px 13px;">
        ${[['Gastos',prev.desp,d.desp,true],['Economia',Math.max(0,prev.saldo),Math.max(0,d.saldo),false],['Receitas',prev.rec,d.rec,false]].map(([lbl,pv,cv,inv])=>{
          const dif=cv-pv;const pct=pv>0?Math.abs(dif/pv*100).toFixed(0):0;const up=dif>0;const col=inv?(up?'#D85A30':'#1D9E75'):(up?'#1D9E75':'#D85A30');
          return `<div style="display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;background:var(--bg2);margin-bottom:5px;"><span style="font-family:var(--cg);font-size:10px;color:var(--muted);flex:1">${lbl}</span><span style="font-family:var(--cg);font-size:10px;font-weight:700;color:var(--text)">${fmt(pv)}</span>${pv>0?`<span style="font-size:9px;font-weight:700;color:${col}">${up?'↑':'↓'} ${pct}%</span>`:''}</div>`;
        }).join('')}
      </div>`:''}
      ${metas.length>0?`<div class="stitle">Metas</div>${metas.slice(0,3).map(m=>{const mp=m.alvo>0?Math.min(100,(m.atual/m.alvo)*100):0;const mc=mp>=100?'#1D9E75':mp>=50?'#BA7517':'#D85A30';return `<div class="card" style="padding:10px 13px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-family:var(--cg);font-size:11px;font-weight:800">${m.nome}</span><span style="font-family:var(--cg);font-size:11px;font-weight:800;color:${mc}">${mp.toFixed(0)}%</span></div><div class="pbar-bg"><div class="pbar-fill" style="width:${mp}%;background:${mc}"></div></div><div style="display:flex;justify-content:space-between;font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:2px"><span>${fmt(m.atual)}</span><span>${fmt(m.alvo)}</span></div></div>`;}).join('')}`:''}
      <div class="stitle">Gastos por categoria</div>
      <div class="card" style="padding:10px 13px;">${sorted.length===0?'<div class="empty" style="padding:.75rem 0">Nenhuma despesa neste mês</div>':sorted.slice(0,6).map(([cat,val])=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;"><span style="font-family:var(--cg);font-size:10px;font-weight:700;min-width:80px;color:var(--text)">${cat}</span><div style="flex:1;background:var(--bg2);border-radius:99px;height:5px;overflow:hidden;"><div style="height:5px;border-radius:99px;width:${tot>0?(val/tot*100).toFixed(0):0}%;background:${catCor(u.id,cat)}"></div></div><span style="font-family:var(--cg);font-size:9px;color:var(--muted);min-width:60px;text-align:right">${fmt(val)}</span></div>`).join('')}</div>
      <div class="stitle">Últimos lançamentos</div>
      ${[...d.fil].sort((a,b)=>new Date(b.data)-new Date(a.data)).slice(0,5).map(t=>txR(t)).join('')||'<div class="empty">Nenhum lançamento neste mês</div>'}`;
  }

  if(sec==='extrato'){
    const txs=[...getTxs(u.id)].sort((a,b)=>new Date(b.data)-new Date(a.data));
    pc.innerHTML=`
      <div style="font-family:var(--cg);font-size:11px;color:var(--muted);margin-bottom:8px">${txs.length} lançamentos no total</div>
      ${txs.length===0?'<div class="empty">Nenhum lançamento ainda</div>':txs.map(t=>txR(t,true)).join('')}`;
  }

  if(sec==='metas'){
    const metas=getMetas(u.id);const mm=getMetaMens(u.id);
    pc.innerHTML=`
      <div class="card">
        <div class="card-title">💰 Meta mensal de economia</div>
        <div class="form-grid">
          <div class="fg"><label class="flabel">Valor meta (R$)</label><input class="finput" id="mm-v" type="number" placeholder="Ex: 500" value="${mm>0?mm:''}" inputmode="decimal"></div>
          <div class="fg" style="justify-content:flex-end;"><button class="btn" style="background:var(--purple);margin-top:17px" onclick="salvarMM()"><i class="ti ti-check"></i> Salvar</button></div>
        </div>
        ${mm>0?`<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-family:var(--cg);font-size:11px;font-weight:800">Progresso este mês</span><span style="font-family:var(--cg);font-size:11px;font-weight:800;color:${d.saldo>=mm?'#1D9E75':'#BA7517'}">${Math.min(100,Math.max(0,(d.saldo/mm)*100)).toFixed(0)}%</span></div><div class="pbar-bg"><div class="pbar-fill" style="width:${Math.min(100,Math.max(0,(d.saldo/mm)*100))}%;background:${d.saldo>=mm?'#1D9E75':'#BA7517'}"></div></div><div style="display:flex;justify-content:space-between;font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:2px"><span>${fmt(Math.max(0,d.saldo))}</span><span>${fmt(mm)}</span></div></div>`:''}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
        <div class="stitle" style="margin:0">Metas de poupança (${metas.length})</div>
        <button class="btn" style="background:${u.cor};font-size:10px;padding:6px 12px" onclick="abrirMMeta()"><i class="ti ti-plus"></i> Nova</button>
      </div>
      ${metas.length===0?'<div class="empty">Nenhuma meta cadastrada.<br>Adicione uma meta para começar!</div>':metas.map(m=>{
        const mp=m.alvo>0?Math.min(100,(m.atual/m.alvo)*100):0;const mc=mp>=100?'#1D9E75':mp>=50?'#BA7517':'#D85A30';
        const bc=mp>=100?'background:var(--green-l);color:var(--green-d)':mp>=50?'background:var(--amber-l);color:var(--amber-d)':'background:var(--red-l);color:var(--red-d)';
        return `<div class="meta-item"><div class="meta-top"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;"><span class="meta-name">${m.nome}</span><span style="font-size:9px;padding:2px 7px;border-radius:99px;font-weight:700;${bc}">${mp>=100?'✅ Concluída':mp>=50?'Em andamento':'Iniciando'}</span></div><div style="display:flex;align-items:center;gap:5px;"><span class="meta-pct" style="color:${mc}">${mp.toFixed(0)}%</span><button class="meta-del" onclick="delMeta('${m.id}')"><i class="ti ti-x"></i></button></div></div><div class="pbar-bg"><div class="pbar-fill" style="width:${mp}%;background:${mc}"></div></div><div class="meta-vals"><div style="display:flex;align-items:center;gap:5px;"><span>Guardado:</span><input type="number" value="${m.atual}" style="font-family:var(--cg);font-size:10px;width:80px;padding:3px 7px;border:.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none;" onchange="updMeta('${m.id}',this.value)"></div><span>Meta: ${fmt(m.alvo)}</span></div></div>`;
      }).join('')}`;
  }

  if(sec==='conquistas'){
    const txs=getTxs(u.id);const metas=getMetas(u.id);
    const total=txs.length;const totalEco=metas.filter(m=>m.atual>=m.alvo).length;
    const totalRec=txs.filter(t=>t.tipo==='receita').reduce((a,t)=>a+Number(t.valor),0);
    const badges=[
      {e:'🚀',l:'Primeiro lançamento',ok:total>=1,d:'Faça seu primeiro lançamento'},
      {e:'💰',l:'Guardou dinheiro',ok:metas.some(m=>m.atual>0),d:'Comece a guardar em uma meta'},
      {e:'🎯',l:'Meta concluída',ok:totalEco>=1,d:'Conclua sua primeira meta'},
      {e:'⭐',l:'10 lançamentos',ok:total>=10,d:'Faça 10 movimentações'},
      {e:'🏆',l:'3 metas concluídas',ok:totalEco>=3,d:'Conclua 3 metas de poupança'},
      {e:'💎',l:'Poupador(a)',ok:totalEco>=5,d:'Conclua 5 metas de poupança'},
    ];
    pc.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">${badges.map(b=>`<div style="background:${b.ok?'var(--green-l)':'var(--bg2)'};border:.5px solid ${b.ok?'#1D9E75':'var(--border)'};border-radius:12px;padding:13px 11px;text-align:center;opacity:${b.ok?1:.45};"><div style="font-size:30px;margin-bottom:6px">${b.e}</div><div style="font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text)">${b.l}</div><div style="font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:3px">${b.ok?'✅ Conquistado!':b.d}</div></div>`).join('')}</div>`;
  }

  if(sec==='familia'){
    const adultos=usuarios.filter(u=>u.tipo==='adulto');
    const filhos=usuarios.filter(u=>u.tipo==='filho');
    const mes=NOW.getMonth(),ano=NOW.getFullYear();
    pc.innerHTML=`
      <div class="stitle">Adultos (${adultos.length})</div>
      ${adultos.map(a=>{const da=getMesData(getTxs(a.id),mes,ano);return `<div class="card" style="padding:11px 13px;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;background:${a.cor}22;border:2px solid ${a.cor};flex-shrink:0">${a.avatar}</div><div style="flex:1"><div style="font-family:var(--cg);font-size:13px;font-weight:800">${a.nome}</div><div style="font-family:var(--cg);font-size:9px;color:var(--muted)">${a.subtipo==='m'?'Marido / Pai':'Esposa / Mãe'}</div></div><div style="text-align:right"><div style="font-family:var(--cg);font-size:13px;font-weight:800;color:${da.saldo>=0?'var(--green-d)':'var(--red-d)'}">${fmt(da.saldo)}</div><div style="font-family:var(--cg);font-size:9px;color:var(--muted)">saldo ${MESES[mes]}</div></div></div></div>`;}).join('')||'<div class="empty">Nenhum adulto cadastrado</div>'}
      <div class="stitle">Filhos (${filhos.length})</div>
      ${filhos.map(f=>{const df=getMesData(getTxs(f.id),mes,ano);const mf=getMetas(f.id);const tA=mf.reduce((a,m)=>a+m.alvo,0);const tG=mf.reduce((a,m)=>a+m.atual,0);return `<div class="card" style="padding:11px 13px;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;background:${f.cor}22;border:2px solid ${f.cor};flex-shrink:0">${f.avatar}</div><div style="flex:1"><div style="font-family:var(--cg);font-size:13px;font-weight:800">${f.nome}</div><div style="font-family:var(--cg);font-size:9px;color:var(--muted)">${f.idade?f.idade+' anos':''} · ${mf.length} meta(s)</div></div><div style="text-align:right"><div style="font-family:var(--cg);font-size:13px;font-weight:800;color:${df.saldo>=0?'var(--green-d)':'var(--red-d)'}">${fmt(df.saldo)}</div><div style="font-family:var(--cg);font-size:9px;color:var(--muted)">saldo ${MESES[mes]}</div></div></div>${tA>0?`<div style="margin-top:8px"><div class="pbar-bg"><div class="pbar-fill" style="width:${Math.min(100,(tG/tA)*100)}%;background:#1D9E75"></div></div><div style="display:flex;justify-content:space-between;font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:2px"><span>Guardado: ${fmt(tG)}</span><span>Meta: ${fmt(tA)}</span></div></div>`:''}</div>`;}).join('')||'<div class="empty">Nenhum filho cadastrado</div>'}
      <button class="btn" style="background:var(--purple);width:100%;justify-content:center;margin-top:6px" onclick="renderHomeGeral();setTimeout(iniciarCadastro,200)"><i class="ti ti-plus"></i> Adicionar membro da família</button>`;
  }

  if(sec==='config'){
    pc.innerHTML=`
      <div class="card">
        <div class="card-title">👤 Meu perfil</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:27px;background:${u.cor}22;border:3px solid ${u.cor}">${u.avatar}</div>
          <div><div style="font-family:var(--cg);font-size:14px;font-weight:800">${u.nome}</div><div style="font-family:var(--cg);font-size:10px;color:var(--muted)">${u.tipo==='filho'?'Filho(a)'+(u.idade?' · '+u.idade+' anos':''):u.subtipo==='m'?'Marido / Pai':'Esposa / Mãe'}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">💾 Backup de dados</div>
        <div style="font-family:var(--cg);font-size:10px;color:var(--muted);margin-bottom:10px">Exporte antes de atualizar o app para não perder dados.</div>
        <div class="btn-row">
          <button class="btn" style="background:#1D9E75" onclick="exportarDados()"><i class="ti ti-download"></i> Exportar backup</button>
          <label class="btn" style="background:var(--purple);cursor:pointer"><i class="ti ti-upload"></i> Importar<input type="file" accept=".json" style="display:none" onchange="importarDados(this)"></label>
        </div>
        <div style="font-family:var(--cg);font-size:10px;color:var(--muted);margin-top:7px" id="cfg-imp-st"></div>
      </div>
      <div class="card">
        <div class="card-title" style="color:var(--red-d)">⚠️ Zona de perigo</div>
        <div style="font-family:var(--cg);font-size:10px;color:var(--muted);margin-bottom:9px">Remove todos os seus lançamentos. Irreversível.</div>
        <button class="btn" style="background:var(--red)" onclick="limparLancamentos()"><i class="ti ti-trash"></i> Limpar meus lancamentos</button>
      </div>`;
  }
}

function txR(t,showDel=false){
  const isR=t.tipo==='receita';const d=new Date(t.data+'T12:00:00');const dd=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  return `<div class="tx-row"><div style="width:8px;height:8px;border-radius:50%;background:${isR?'#1D9E75':'#D85A30'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-family:var(--cg);font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.descricao}</div><div style="font-family:var(--cg);font-size:9px;color:var(--muted)">${dd} · ${t.categoria}</div></div><div style="font-family:var(--cg);font-size:12px;font-weight:800;color:${isR?'var(--green-d)':'var(--red-d)'}">${isR?'+':'-'}${fmt(t.valor)}</div>${showDel?`<button style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 4px;" onclick="delTx('${t.id}')"><i class="ti ti-trash"></i></button>`:''}</div>`;
}

function delTx(id){if(!confirm('Excluir este lançamento?'))return;saveTxs(currentUser.id,getTxs(currentUser.id).filter(t=>t.id!==id));renderPC(currentPanel);}

/* METAS */
function abrirMMeta(){fmetaUid=currentUser.id;document.getElementById('fmeta-nome').value='';document.getElementById('fmeta-alvo').value='';document.getElementById('fmeta-atual').value='';document.getElementById('modal-fmeta').style.display='flex';}
function fecharMMeta(){document.getElementById('modal-fmeta').style.display='none';}
function salvarFMeta(){
  const nome=document.getElementById('fmeta-nome').value.trim();const alvo=parseFloat(document.getElementById('fmeta-alvo').value)||0;const atual=parseFloat(document.getElementById('fmeta-atual').value)||0;
  if(!nome||!alvo){alert('Preencha nome e valor alvo.');return;}
  const mts=getMetas(fmetaUid);mts.push({id:Date.now()+'',nome,alvo,atual});saveMetas(fmetaUid,mts);fecharMMeta();renderPC('metas');
}
function delMeta(id){if(!confirm('Excluir esta meta?'))return;saveMetas(currentUser.id,getMetas(currentUser.id).filter(m=>m.id!==id));renderPC('metas');}
function updMeta(id,val){const mts=getMetas(currentUser.id);const m=mts.find(m=>m.id===id);if(m){m.atual=parseFloat(val)||0;saveMetas(currentUser.id,mts);}}
function salvarMM(){const v=parseFloat(document.getElementById('mm-v').value)||0;SS('fam1_mm_'+currentUser.id,v);renderPC('metas');}

/* LANÇAR */
function atualizaCatModal(){
  const tipo=document.getElementById('lc-tipo').value;const uid=currentUser.id;
  const cats=getCats(uid).filter(c=>c.tipo===tipo||c.tipo==='ambos');
  document.getElementById('lc-cat').innerHTML=cats.map(c=>`<option value="${c.nome}">${c.nome}</option>`).join('');
}
function abrirMLancar(){
  const u=currentUser;const isFil=u.tipo==='filho';
  document.getElementById('lc-title').textContent=isFil?'💸 Lançamento — '+u.nome:'💸 Novo lançamento';
  document.getElementById('lc-lbl-rec').textContent=isFil?'Recebimento':'Receita';
  document.getElementById('lc-lbl-desp').textContent=isFil?'Gasto':'Despesa';
  document.getElementById('lc-data').value=NOW.toISOString().split('T')[0];
  document.getElementById('lc-desc').value='';document.getElementById('lc-valor').value='';
  if(document.getElementById('lc-obs'))document.getElementById('lc-obs').value='';
  document.getElementById('lc-tipo').value='despesa';atualizaCatModal();
  document.getElementById('modal-lancar').style.display='flex';
}
function fecharMLancar(){document.getElementById('modal-lancar').style.display='none';}
function addTxModal(tipo){
  const desc=document.getElementById('lc-desc').value.trim();const valor=parseFloat(document.getElementById('lc-valor').value);const data=document.getElementById('lc-data').value;const cat=document.getElementById('lc-cat').value;const obs=(document.getElementById('lc-obs')||{}).value?.trim()||'';
  if(!desc||!valor||!data){alert('Preencha descrição, valor e data.');return;}
  const txs=getTxs(currentUser.id);txs.unshift({id:Date.now()+'',tipo,descricao:desc,valor,data,categoria:cat,obs});saveTxs(currentUser.id,txs);
  fecharMLancar();
  if(currentPanel==='painel'||currentPanel==='extrato')renderPC(currentPanel);
  renderHomeInd();
}

/* LIMPAR */
function limparLancamentos(){if(!confirm('Apagar todos os seus lancamentos? Irreversivel!'))return;saveTxs(currentUser.id,[]);renderPC('config');}

/* BACKUP */
function exportarDados(){
  const data={versao:4,exportadoEm:new Date().toISOString(),usuarios,txs:{},metas:{},metamens:{}};
  usuarios.forEach(u=>{data.txs[u.id]=getTxs(u.id);data.metas[u.id]=getMetas(u.id);data.metamens[u.id]=getMetaMens(u.id);});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`financas-familia-backup-${NOW.toISOString().split('T')[0]}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importarDados(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.versao){alert('Arquivo inválido.');return;}
      if(!confirm('Substituir todos os dados pelo backup? Isso não pode ser desfeito.'))return;
      if(d.usuarios){SS('fam1_users',d.usuarios);usuarios=d.usuarios;}
      if(d.txs)Object.entries(d.txs).forEach(([uid,v])=>saveTxs(uid,v));
      if(d.metas)Object.entries(d.metas).forEach(([uid,v])=>saveMetas(uid,v));
      if(d.metamens)Object.entries(d.metamens).forEach(([uid,v])=>SS('fam1_mm_'+uid,v));
      const st=document.getElementById('imp-st')||document.getElementById('cfg-imp-st');
      if(st){st.textContent='✅ Dados importados com sucesso!';setTimeout(()=>{st.textContent='';},3000);}
      renderHomeGeral();
    }catch(e){alert('Erro ao ler o arquivo. Verifique se é um backup válido.');}
    input.value='';
  };reader.readAsText(file);
}

/* INIT */
renderHomeGeral();
</script>
</body>
</html>
